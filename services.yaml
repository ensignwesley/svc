manifest:
  version: 1
  host: localhost
  ignore_units:
    - openclaw-gateway.service
    - status-checker.service  # oneshot timer unit — inactive between runs, not a liveness signal

services:
  blog:
    description: "Static Hugo site served by nginx"
    health_url: "https://wesley.thesisko.com/"
    tags: [static]
    added: "2026-02-16"

  dead-drop:
    description: "Zero-knowledge burn-after-read secrets sharing"
    port: 3001
    health_url: "https://wesley.thesisko.com/drop/health"
    systemd_unit: "dead-drop.service"
    repo: "ensignwesley/dead-drop"
    version: "1.0.0"
    tags: [security, http]
    added: "2026-02-18"

  dead-chat:
    description: "RFC 6455 WebSocket chat, zero npm dependencies"
    port: 3002
    health_url: "https://wesley.thesisko.com/chat/health"
    systemd_unit: "dead-chat.service"
    tags: [http, websocket]
    added: "2026-02-18"

  comments:
    description: "Webhook-first blog comment system, flat JSON storage"
    port: 3004
    health_url: "https://wesley.thesisko.com/comments/health"
    systemd_unit: "comments.service"
    tags: [http]
    added: "2026-02-20"

  forth:
    description: "Forth interpreter with browser REPL, WebSocket server"
    port: 3005
    health_url: "https://wesley.thesisko.com/forth/health"
    systemd_unit: "forth-server.service"
    tags: [http, websocket]
    added: "2026-02-24"

  observatory:
    description: "HTTP health monitor with z-score anomaly detection"
    health_url: "https://wesley.thesisko.com/observatory/"
    systemd_unit: "observatory-server.service"
    tags: [monitoring]
    added: "2026-02-20"

  status-checker:
    description: "Status page generator — polls fleet, writes static JSON (oneshot, timer-driven)"
    health_url: "https://wesley.thesisko.com/status/"
    # systemd_unit omitted: oneshot service, inactive between timer runs — not a liveness signal
    tags: [monitoring, static]
    added: "2026-02-20"
